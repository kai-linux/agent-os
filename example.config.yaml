root_dir: "~/agent-os"

mailbox_dir: "~/agent-os/runtime/mailbox"
logs_dir: "~/agent-os/runtime/logs"
worktrees_dir: "/path/to/worktrees"

allowed_repos:
  - /path/to/repo1

default_agent: auto
default_task_type: implementation
max_runtime_minutes: 40
default_base_branch: main
default_allow_push: true
default_max_attempts: 4
max_parallel_workers: 1

agent_fallbacks:
  implementation: [codex, claude, gemini, deepseek]
  debugging: [claude, gemini, codex, deepseek]
  architecture: [claude, gemini, codex, deepseek]
  research: [claude, gemini, codex, deepseek]
  docs: [claude, gemini, codex, deepseek]
  browser_automation: [claude, gemini, codex, deepseek]

agent_timeout_minutes:
  codex: 40
  claude: 45
  gemini: 35
  deepseek: 30

github_owner: "yourname"
github_project_number: 1
github_project_status_field: "Status"
github_project_ready_value: "Ready"
github_project_in_progress_value: "In Progress"
github_project_review_value: "Review"
github_project_blocked_value: "Blocked"
github_project_done_value: "Done"

github_repos:
  repo1: "repo1"

telegram_bot_token: "YOUR_TELEGRAM_BOT_TOKEN"
telegram_chat_id: "YOUR_CHAT_ID"