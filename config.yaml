    repos:
      - key: "kdp"
        github_repo: "kai-linux/kdp"
        local_repo: "/home/kai/kdp"
        sprint_cadence_days: 0
        groomer_cadence_days: 0
        plan_size: 2
    required_labels:
      - "ready"
    excluded_labels:
      - "blocked"
      - "in-progress"
      - "done"
      - "agent-dispatched"
    status_field: "Status"
    ready_value: "Ready"
    in_progress_value: "In progress"
    review_value: "In review"
    blocked_value: "Blocked"
    done_value: "Done"

  browser-automation:
    project_number: 4
    title: "Browser Automation Harness"
    automation_mode: dispatcher_only
    repos:
      - key: "browser-automation"
        sprint_cadence_days: 0
