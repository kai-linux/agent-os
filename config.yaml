root_dir: "/home/kai/agent-os"
trusted_authors:
    - kai-linux
mailbox_dir: "/home/kai/agent-os/runtime/mailbox"
logs_dir: "/home/kai/agent-os/runtime/logs"
worktrees_dir: "/srv/worktrees"
objectives_dir: "/home/kai/agent-os/objectives"
evidence_dir: "/home/kai/.local/share/agent-os/evidence"
repo_objectives:
  kai-linux/agent-os: "/home/kai/agent-os/objectives/agent-os.yaml"

planner_allow_early_refresh: false

#bookgenerator = writeaibook
allowed_repos:
  - /home/kai/agent-os
  - /home/kai/bookgenerator
  - /home/kai/content-automation
  - /home/kai/kdp
  - /home/kai/browser-automation

# Parallel workers (added by parallel queue task)
max_parallel_workers: 1          # increase when ready for parallelism

# Priority scoring (added by priority queue task)
priority_weights:
  prio:high: 30
  prio:normal: 10
  prio:low: 0

# Test runner (added by test runner task)
test_timeout_minutes: 5
  # repo_configs:                   # optional, per-repo test commands
  #   /home/kai/bookgenerator:
  #     test_command: "pytest -q"

automation_mode: full # choose dispatcher_only 

default_agent: auto
default_task_type: implementation
formatter_model: haiku
max_runtime_minutes: 40
default_base_branch: main
default_allow_push: true
default_max_attempts: 4

agent_fallbacks:
  implementation: [claude, claude, gemini, deepseek]
  debugging: [claude, codex, gemini, deepseek]
  architecture: [claude, codex]
  research: [claude, codex]
  docs: [claude, codex]
  design: [claude, codex]
  content: [claude, codex]
  browser_automation: [claude, codex, gemini, deepseek]

planner_agents: [claude, codex]
# planner_claude_model: opus

agent_timeout_minutes:
  codex: 40
  claude: 45
  gemini: 35
  deepseek: 30

github_owner: "kai-linux"
github_projects:
  writeaibook:
    project_number: 1
    title: "Grow writeaibook"
    automation_mode: dispatcher_only 
    repos:
      - key: "writeaibook"
        github_repo: "kai-linux/bookgenerator"
        local_repo: "/home/kai/bookgenerator"
        sprint_cadence_days: 0
        groomer_cadence_days: 0
        plan_size: 5
    required_labels:
      - "ready"
    excluded_labels:
      - "blocked"
      - "in-progress"
      - "review"
      - "done"
      - "agent-dispatched"
    status_field: "Status"
    ready_value: "Ready"
    in_progress_value: "In Progress"
    review_value: "Review"
    blocked_value: "Blocked"
    done_value: "Done"
    production_feedback:
          enabled: false
          max_age_hours: 24
          stale_after_hours: 72
          allowed_domains:
            - analytics.google.com
          inputs:
            - name: "Weekly activation funnel"
              type: "web"
              signal_class: "analytics"
              url: "https://analytics.example.com/public/weekly-funnel"
              observed_at: "2026-03-20T08:00:00Z"
              provenance: "Public dashboard snapshot"
              trust_level: "high"
              trust_note: "Aggregated planning-safe metrics"
              privacy: "public"
              privacy_note: "No user-level data"
          minimum_trust_level: "medium"
          max_inputs: 4
          max_source_chars: 4000
          allowed_domains: []
          artifact_file: "PRODUCTION_FEEDBACK.md"
          inputs: []
    outcome_attribution:
          enabled: false
          allowed_domains:
            - analytics.google.com
          checks:
            - id: "activation_rate"
              name: "Activation rate"
              type: "web"
              url: "https://analytics.google.com/public/activation-after-release"
              measurement_window_days: 7
              comparison_window: "Compare 7 days after merge vs 7 days before merge"

  agent-os:
    project_number: 6
    title: "Automate agent-os"
    automation_mode: full
    # Objective: grow trusted adoption (stars, forks, users) through reliable
    # autonomous execution, visible proof of capability, and low activation friction.
    agent_fallbacks:
      implementation: [claude, codex, gemini, deepseek]
      debugging: [claude, codex, gemini, deepseek]
      architecture: [claude, codex]
      research: [claude, codex]
      docs: [claude, codex]
      design: [claude, codex]
      content: [claude, codex]
      browser_automation: [claude, codex, gemini, deepseek]
    repos:
      - key: "agent-os"
        github_repo: "kai-linux/agent-os"
        local_repo: "/home/kai/agent-os"
        sprint_cadence_days: 0.5
        groomer_cadence_days: 0.5
        planner_allow_early_refresh: false
        plan_size: 5
        planning_research:
          enabled: true
          max_age_hours: 72
          max_sources: 4
          max_source_chars: 4000
          allowed_domains:
            - github.com
          dynamic_search:
            enabled: true
            max_queries: 3
          artifact_file: "PLANNING_RESEARCH.md"
          sources:
            - name: "Public repo surface"
              type: "web"
              kind: "product_surface"
              url: "https://github.com/kai-linux/agent-os"
            - name: "Competitor: Paperclip autonomous org framework"
              type: "web"
              kind: "competitive_intel"
              url: "https://github.com/paperclipai/paperclip"
            - name: "Competitor: OpenHands AI agent framework"
              type: "web"
              kind: "competitive_intel"
              url: "https://github.com/All-Hands-AI/OpenHands"
            - name: "Production metrics report"
              type: "file"
              kind: "production_evidence"
              path: "runtime/analysis/metrics_report.md"
            - name: "Repo README"
              type: "file"
              kind: "repo_reference"
              path: "README.md"
            - name: "Codebase memory"
              type: "file"
              kind: "repo_reference"
              path: "CODEBASE.md"
        production_feedback:
          enabled: true
          max_age_hours: 168
          stale_after_hours: 336
          minimum_trust_level: "medium"
          allowed_privacy_levels:
            - public
            - internal
          max_inputs: 6
          max_source_chars: 4000
          allowed_domains: []
          artifact_file: "PRODUCTION_FEEDBACK.md"
          inputs:
            - name: "Agent performance metrics"
              type: "file"
              path: "runtime/analysis/metrics_report.md"
              privacy_level: "internal"
              trust_level: "high"
            - name: "Scorer degradation findings"
              type: "file"
              path: "runtime/analysis/agent_scorer_findings.json"
              privacy_level: "internal"
              trust_level: "high"
        outcome_attribution:
          enabled: true
          max_source_chars: 4000
          allowed_domains: []
          checks:
            # -- universal checks (no labels filter → applied to all issues) --
            - id: "agent_success_rate"
              name: "Agent success rate"
              type: "file"
              path: "runtime/analysis/metrics_report.md"
              measurement_window_days: 7
              comparison_window: "Compare the 'current week' success rates against the 'prior week' rates. If overall success rate increased, interpret as improved. If it decreased by more than 5 percentage points, interpret as regressed."

            # -- bug / debugging checks --
            - id: "ci_stability"
              name: "CI stability post-fix"
              type: "file"
              path: "runtime/analysis/metrics_report.md"
              measurement_window_days: 3
              labels: [bug, debugging]
              comparison_window: "Check whether the failure or blocker that motivated this fix has recurred in the 3 days after merge. If no recurrence, interpret as improved. If the same failure reappeared, interpret as regressed."
            - id: "blocked_task_rate"
              name: "Blocked task rate"
              type: "file"
              path: "runtime/analysis/metrics_report.md"
              measurement_window_days: 7
              labels: [bug]
              comparison_window: "Compare the 'current week' blocked-task count against the 'prior week'. Fewer blocked tasks means improved. More means regressed. A change of less than 2 is unchanged."

            # -- enhancement checks --
            - id: "escalation_rate"
              name: "Escalation rate"
              type: "file"
              path: "runtime/analysis/metrics_report.md"
              measurement_window_days: 7
              labels: [enhancement]
              comparison_window: "Compare the 'current week' escalation rate against the 'prior week'. Lower escalation rate means improved. Higher means regressed. A change of less than 5 percentage points is unchanged."
            - id: "task_completion_time"
              name: "Task completion time"
              type: "file"
              path: "runtime/analysis/metrics_report.md"
              measurement_window_days: 7
              labels: [enhancement]
              comparison_window: "Compare the 'current week' mean completion time against the 'prior week'. Lower completion time means improved. Significantly higher means regressed."
    required_labels:
      - "ready"
    excluded_labels:
      - "blocked"
      - "in-progress"
    status_field: "Status"
    ready_value: "Ready"
    in_progress_value: "In Progress"
    review_value: "Review"
    blocked_value: "Blocked"
    done_value: "Done"


  content-automation:
    project_number: 7
    title: "Content Automation Harness"
    automation_mode: dispatcher_only
    repos:
      - key: "content-automation"
        sprint_cadence_days: 0
